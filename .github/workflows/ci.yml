name: ci

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test (includes diff fuzz harness)
        run: cargo test
      - name: tests with serde derives (feature-gated)
        run: cargo test -p zumar-core -p zumar-runtime --features serde
      - name: js guard tests
        run: node www/test-guards.mjs

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: build examples
        run: |
          for ex in counter todo effects; do
            wasm-pack build examples/$ex --target web --out-dir www/pkg --release
          done
      - name: compile counter.zu end-to-end
        run: |
          cargo run --release -p zumar-cli --bin zuc -- build \
            examples/lang-counter/counter.zu --out /tmp/zu-app --zumar "$PWD"
          wasm-pack build /tmp/zu-app --target web --out-dir /tmp/zu-app/pkg --release
      - name: effects from .zu (clock.zu end-to-end)
        run: |
          cd examples/lang-clock
          cargo run --release -p zumar-cli --bin zuc -- build clock.zu --out app --zumar "$PWD/../.."
          wasm-pack build app --target web --out-dir ../www/pkg --release
          cd www && cp ../test.mjs . && node test.mjs
      - name: wasmgc backend (emit counter/hello/todo, run behavior harnesses)
        run: |
          for app in counter hello todo clock kanban queue expenses; do
            cargo run --release -p zumar-wasmgc --bin zuc-gc -- \
              examples/lang-$app/$app.zu -o spikes/wasmgc/$app-emitted.wasm
          done
          cargo run --release -p zumar-wasmgc --bin zuc-gc -- \
            spikes/wasmgc/toggle.zu -o spikes/wasmgc/toggle-emitted.wasm
          node spikes/wasmgc/run-emitted.mjs
          node spikes/wasmgc/run-hello.mjs
          node spikes/wasmgc/run-todo.mjs
          node spikes/wasmgc/run-clock.mjs
          node spikes/wasmgc/run-kanban.mjs
          node spikes/wasmgc/run-remaining.mjs
      - name: zuc --backend gc (CLI path)
        run: |
          cargo run --release -p zumar-cli --bin zuc -- build \
            examples/lang-kanban/kanban.zu --backend gc --out /tmp/kanban.wasm
          test -s /tmp/kanban.wasm
      - name: wire smoke test through the wasm binary
        run: |
          cd examples/effects/www
          node --input-type=module -e "
          import { readFile } from 'node:fs/promises';
          import { decodeInit, decodeUpdate } from './zumar-wire.js';
          const mod = await import('./pkg/effects.js');
          const bytes = await readFile(new URL('./pkg/effects_bg.wasm', 'file://' + process.cwd() + '/'));
          await mod.default({ module_or_path: bytes });
          const app = new mod.App();
          const init = decodeInit(app.init());
          if (init.cmds.length !== 1 || init.subs.length !== 1) throw new Error('bad init');
          const r = decodeUpdate(app.notify(init.subs[0].id, 45296000));
          if (r.patches[0].text !== '12:34:56') throw new Error('bad clock patch');
          console.log('wire smoke ok');
          "
