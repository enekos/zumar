<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zumar-lang — expenses.zu</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: start center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; padding-top: 9vh;
    }
    .exp { width: min(30rem, 92vw); }
    .exp h1 { font-size: 1.8rem; letter-spacing: 0.2em; color: #7bb0d9; margin-bottom: 0.1rem; }
    .sub { color: #6f7362; font-size: 0.78rem; margin-top: 0; }
    form { display: flex; gap: 0.5rem; margin: 0.8rem 0; }
    input[type="text"] {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; padding: 0.5rem 0.8rem; min-width: 0;
    }
    form input:first-child { flex: 2; }
    form input:nth-child(2) { flex: 1; }
    input[type="text"]:focus { outline: none; border-color: #7bb0d9; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; padding: 0.5rem 0.9rem; cursor: pointer;
    }
    button:hover { border-color: #7bb0d9; }
    .total { font-size: 1.5rem; color: #7bb0d9; margin: 0.4rem 0 0.8rem;
             font-variant-numeric: tabular-nums; }
    ul.items { list-style: none; padding: 0; margin: 0; }
    ul.items li { display: flex; align-items: center; gap: 0.6rem;
                  padding: 0.45rem 0.2rem; border-bottom: 1px solid #1e2318; }
    ul.items li .label { flex: 1; }
    ul.items li .cents { color: #9db668; font-variant-numeric: tabular-nums; }
    .del { border: none; background: none; color: #6f7362; font-size: 1rem; padding: 0 0.4rem; }
    .del:hover { color: #d98c7a; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import init, { App } from "./pkg/expenses.js";
    import { mount } from "./zumar.js";
    await init();
    mount(new App(), document.getElementById("app"));
  </script>
</body>
</html>
