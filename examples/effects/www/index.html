<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zumar — effects</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: start center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      padding: 8vh 1rem;
    }
    .fx { width: min(30rem, 92vw); }
    .fx h1 { font-size: 1.8rem; letter-spacing: 0.3em; color: #9db668; text-align: center; }
    section { border: 1px solid #1e2318; border-radius: 10px; padding: 0.8rem 1.1rem; margin-bottom: 0.9rem; }
    h2 { font-size: 0.75rem; font-weight: normal; color: #6f7362; margin: 0 0 0.6rem; }
    .time { font-size: 2rem; font-variant-numeric: tabular-nums; margin-bottom: 0.5rem; }
    .row { display: flex; align-items: center; gap: 0.8rem; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; font-size: 0.85rem; padding: 0.35rem 0.9rem; cursor: pointer;
    }
    button:hover { border-color: #9db668; }
    .toast { color: #9db668; font-size: 0.85rem; min-height: 1em; }
    blockquote { margin: 0 0 0.6rem; color: #c9c6b4; font-style: italic; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import init, { App } from "./pkg/effects.js";
    import { mount } from "./zumar.js";

    await init();
    mount(new App(), document.getElementById("app"));
  </script>
</body>
</html>
