<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zumar — counter</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .counter { text-align: center; }
    .counter h1 { font-size: 2.2rem; letter-spacing: 0.3em; margin-bottom: 0.2rem; color: #9db668; }
    .sub { color: #6f7362; font-size: 0.8rem; margin-top: 0; }
    .row { display: flex; align-items: center; justify-content: center; gap: 1.2rem; margin: 2rem 0 1rem; }
    .count { font-size: 3rem; min-width: 4ch; font-variant-numeric: tabular-nums; }
    .count.neg { color: #d98c7a; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; font-size: 1.4rem;
      width: 3rem; height: 3rem; cursor: pointer;
    }
    button:hover { border-color: #9db668; }
    button.reset { width: auto; height: auto; font-size: 0.8rem; padding: 0.4rem 1rem; color: #6f7362; }
    .note { color: #9db668; font-size: 0.8rem; min-height: 1em; }
    .note.hidden { visibility: hidden; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import init, { App } from "./pkg/counter.js";
    import { mount } from "./zumar.js";

    await init();
    mount(new App(), document.getElementById("app"));
  </script>
</body>
</html>
