<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zumar-lang — todo.zu (WasmGC backend)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: start center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace; padding-top: 9vh;
    }
    .todo { width: min(28rem, 90vw); }
    .todo h1 { font-size: 1.8rem; letter-spacing: 0.2em; color: #6ad9c8; margin-bottom: 0.1rem; }
    .sub { color: #6f7362; font-size: 0.78rem; margin-top: 0; }
    form { display: flex; gap: 0.5rem; margin: 0.8rem 0; }
    input[type="text"] {
      flex: 1; background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; padding: 0.5rem 0.8rem;
    }
    input[type="text"]:focus { outline: none; border-color: #6ad9c8; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; padding: 0.5rem 0.9rem; cursor: pointer;
    }
    button:hover { border-color: #6ad9c8; }
    .bar { display: flex; justify-content: space-between; align-items: center;
           color: #6f7362; font-size: 0.8rem; margin-bottom: 0.4rem; }
    .bar button { font-size: 0.75rem; padding: 0.25rem 0.7rem; color: #6f7362; }
    ul.items { list-style: none; padding: 0; margin: 0; }
    ul.items li { display: flex; align-items: center; gap: 0.6rem;
                  padding: 0.45rem 0.2rem; border-bottom: 1px solid #1e2318; }
    ul.items li .check { cursor: pointer; color: #6ad9c8; user-select: none; }
    ul.items li .label { flex: 1; }
    ul.items li.done .label { text-decoration: line-through; color: #6f7362; }
    ul.items li.done .check { color: #6f7362; }
    .del { border: none; background: none; color: #6f7362; font-size: 1rem; padding: 0 0.4rem; }
    .del:hover { color: #d98c7a; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { mount } from "./zumar.js";
    import { gcApp } from "./zumar-gc.js";

    const { instance } = await WebAssembly.instantiateStreaming(fetch("./pkg/todo-gc.wasm"), {});
    mount(gcApp(instance.exports), document.getElementById("app"));
  </script>
</body>
</html>
