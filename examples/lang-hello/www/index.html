<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hello.zu — WasmGC backend</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .hello { text-align: center; width: min(24rem, 90vw); }
    .hello h1 { font-size: 1.8rem; letter-spacing: 0.2em; color: #6ad9c8; margin-bottom: 0.1rem; }
    .sub { color: #6f7362; font-size: 0.78rem; margin-top: 0; margin-bottom: 1.2rem; }
    input[type="text"] {
      width: 100%; box-sizing: border-box;
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; padding: 0.5rem 0.8rem;
    }
    input[type="text"]:focus { outline: none; border-color: #6ad9c8; }
    .greet { font-size: 1.3rem; color: #6ad9c8; min-height: 1.6em; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; font-size: 0.85rem;
      padding: 0.4rem 1rem; cursor: pointer;
    }
    button:hover { border-color: #6ad9c8; }
    .count { color: #6f7362; font-size: 0.8rem; min-height: 1em; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { mount } from "./zumar.js";
    import { gcApp } from "./zumar-gc.js";

    const { instance } = await WebAssembly.instantiateStreaming(fetch("./pkg/hello.wasm"), {});
    mount(gcApp(instance.exports), document.getElementById("app"));
  </script>
</body>
</html>
