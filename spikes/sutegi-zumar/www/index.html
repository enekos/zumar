<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zumar live — counter.zu on the server</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #12140f; color: #e8e6d9;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .counter { text-align: center; }
    .counter h1 { font-size: 2.2rem; letter-spacing: 0.3em; margin-bottom: 0.2rem; color: #d9a76a; }
    .sub { color: #6f7362; font-size: 0.8rem; margin-top: 0; }
    .row { display: flex; align-items: center; justify-content: center; gap: 1.2rem; margin: 2rem 0 1rem; }
    .count { font-size: 3rem; min-width: 4ch; font-variant-numeric: tabular-nums; }
    button {
      background: #1e2318; color: #e8e6d9; border: 1px solid #3a4230;
      border-radius: 8px; font: inherit; font-size: 1.4rem;
      width: 3rem; height: 3rem; cursor: pointer;
    }
    button:hover { border-color: #d9a76a; }
    button.reset { width: auto; height: auto; font-size: 0.8rem; padding: 0.4rem 1rem; color: #6f7362; }
    .note { color: #d9a76a; font-size: 0.8rem; min-height: 1em; }
    .live { position: fixed; bottom: 1rem; color: #6f7362; font-size: 0.75rem; width: 100%; text-align: center; }
  </style>
</head>
<body>
  <div id="app"></div>
  <p class="live">live: state on the server, patches over websocket</p>
  <script type="module">
    import { mountLive } from "/www/zumar-live.js";

    const proto = location.protocol === "https:" ? "wss" : "ws";
    await mountLive(`${proto}://${location.host}/live`, document.getElementById("app"));
  </script>
</body>
</html>
